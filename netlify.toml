[build]
  base    = "xwiggy-app"
  command = "npm install --legacy-peer-deps && npm run build -- --prod"
  publish = "xwiggy-app/dist/xwiggy-app"

[build.environment]
  NODE_VERSION = "16"
  NODE_OPTIONS = "--openssl-legacy-provider"

# SPA fallback — all routes serve index.html so Angular router works
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
